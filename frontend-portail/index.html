<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant de Cours — Portail</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="app-header">
    <a class="app-header__brand" href="index.html">📚 Assistant de Cours</a>
  </header>

  <main class="role-hero">
    <h1 class="role-hero__title">Bienvenue</h1>
    <p class="role-hero__subtitle">Choisissez votre espace pour continuer.</p>

    <div class="role-grid">
      <a class="card role-card role-card--prof" href="../frontend-professeur/index.html">
        <span class="role-card__icon" aria-hidden="true">🧑‍🏫</span>
        <span class="role-card__title">Espace professeur</span>
        <span class="role-card__desc">Gérer vos classes, déposer des documents et piloter vos séances en direct.</span>
      </a>

      <a class="card role-card role-card--eleve" href="../frontend-eleve/index.html">
        <span class="role-card__icon" aria-hidden="true">🎓</span>
        <span class="role-card__title">Espace élève</span>
        <span class="role-card__desc">Suivre vos cours, consulter les documents et poser vos questions en direct.</span>
      </a>
    </div>
  </main>
</body>
</html>
