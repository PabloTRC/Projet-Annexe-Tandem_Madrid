<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant de Cours — Séance en direct</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="app-header">
    <a class="app-header__brand" href="index.html">📚 Assistant de Cours</a>
    <span class="app-header__role">Élève</span>
  </header>

  <main class="page">
    <a id="back-link" class="back-link" href="index.html">← Retour au cours</a>

    <div class="row" style="gap: var(--space-2); margin-bottom: var(--space-3)">
      <span class="badge badge--live">En direct</span>
      <h1 id="seance-title" class="section__title">Chargement…</h1>
    </div>

    <div id="doc-banner" class="live-doc-banner" hidden></div>

    <h2 class="section__title">Mes questions</h2>
    <div id="mes-questions" class="mes-questions"></div>
  </main>

  <form id="question-form" class="question-composer">
    <label for="question-input" class="sr-only">Poser une question</label>
    <input id="question-input" class="input" type="text" placeholder="Poser une question…" autocomplete="off" required />
    <button class="btn btn--primary" type="submit">Envoyer</button>
  </form>

  <script src="js/data/mock-data.js"></script>
  <script src="js/services/api-client.js"></script>
  <script src="js/services/cours-service.js"></script>
  <script src="js/services/seances-service.js"></script>
  <script src="js/services/documents-service.js"></script>
  <script src="js/services/questions-service.js"></script>
  <script src="js/components/render-helpers.js"></script>
  <script src="js/seance-direct.js"></script>
</body>
</html>
