<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant de Cours — Cours</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="app-header">
    <a class="app-header__brand" href="index.html">📚 Assistant de Cours</a>
    <span class="app-header__role">Élève</span>
  </header>

  <main class="page">
    <a class="back-link" href="index.html">← Retour à mes cours</a>
    <h1 id="cours-title" class="section__title">Chargement…</h1>
    <p id="cours-meta" class="section__subtitle"></p>

    <section class="section">
      <h2 class="section__title">Agenda / grands thèmes du cours</h2>
      <div class="card card--padded">
        <p id="agenda-box"></p>
      </div>
    </section>

    <section class="section">
      <h2 class="section__title">Documents des séances précédentes</h2>
      <div class="card card--padded">
        <div id="documents-list" class="stack"></div>
      </div>
    </section>
  </main>

  <script src="js/data/mock-data.js"></script>
  <script src="js/services/api-client.js"></script>
  <script src="js/services/cours-service.js"></script>
  <script src="js/services/seances-service.js"></script>
  <script src="js/services/documents-service.js"></script>
  <script src="js/services/questions-service.js"></script>
  <script src="js/components/render-helpers.js"></script>
  <script src="js/cours.js"></script>
</body>
</html>
