<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant de Cours — Classe</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="app-header">
    <a class="app-header__brand" href="index.html">📚 Assistant de Cours</a>
    <span class="app-header__role">Professeur</span>
  </header>

  <main class="page page--has-sticky-launch">
    <a class="back-link" href="index.html">← Retour aux classes</a>
    <h1 id="classe-title" class="section__title">Chargement…</h1>
    <p id="classe-meta" class="section__subtitle"></p>

    <section class="section">
      <div class="eleves-toolbar">
        <h2 class="section__title" style="margin-bottom:0">Élèves</h2>
        <label class="toggle">
          <input type="checkbox" id="toggle-difficulte" />
          Élèves en difficulté uniquement
        </label>
      </div>
      <div class="card" id="eleves-list"></div>
    </section>

    <section class="section">
      <h2 class="section__title">Documents</h2>
      <div id="dropzone" class="dropzone">
        Glissez-déposez un fichier ici, ou
        <button class="btn btn--sm" id="btn-browse" type="button">choisissez un fichier</button>
        <input type="file" id="file-input" class="sr-only" />
      </div>
      <div class="card card--padded" style="margin-top: var(--space-3)">
        <div id="documents-list" class="stack"></div>
      </div>
    </section>

    <section class="section">
      <h2 class="section__title">Agenda / grands thèmes du cours</h2>
      <div class="field">
        <label for="agenda-textarea" class="sr-only">Agenda du cours</label>
        <textarea id="agenda-textarea" class="textarea" rows="4" placeholder="Notions abordées, plan de la séquence…"></textarea>
        <div id="save-indicator" class="save-indicator"></div>
      </div>
    </section>
  </main>

  <div class="sticky-launch">
    <button id="btn-lancer" class="btn btn--live" disabled>Lancer le cours</button>
  </div>

  <script src="js/data/mock-data.js"></script>
  <script src="js/services/api-client.js"></script>
  <script src="js/services/cours-service.js"></script>
  <script src="js/services/eleves-service.js"></script>
  <script src="js/services/seances-service.js"></script>
  <script src="js/services/documents-service.js"></script>
  <script src="js/services/questions-service.js"></script>
  <script src="js/components/render-helpers.js"></script>
  <script src="js/classe.js"></script>
</body>
</html>
