<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant de Cours — Cours en direct</title>
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="app-header">
    <a class="app-header__brand" href="index.html">📚 Assistant de Cours</a>
    <span class="app-header__role">Professeur</span>
  </header>

  <main class="page">
    <a id="back-link" class="back-link" href="index.html">← Retour à la classe</a>

    <div class="live-header">
      <div class="row" style="gap: var(--space-2)">
        <span class="badge badge--live">En direct</span>
        <h1 id="seance-title" class="section__title">Chargement…</h1>
      </div>
      <div id="doc-info" class="text-sm text-muted"></div>
    </div>

    <div class="live-layout">
      <div>
        <h2 class="section__title">Questions des élèves</h2>
        <div id="questions-groups"></div>
      </div>

      <aside class="live-sidebar">
        <div class="card card--padded">
          <h3 style="margin: 0 0 var(--space-2)">Synthèse des questions</h3>
          <button id="btn-synthese" class="btn btn--primary btn--block" type="button">Générer la synthèse</button>
          <div id="synthese-result" class="synthese-box text-sm"></div>
        </div>
        <button id="btn-terminer" class="btn btn--block" type="button">Terminer la séance</button>
      </aside>
    </div>
  </main>

  <script src="js/data/mock-data.js"></script>
  <script src="js/services/api-client.js"></script>
  <script src="js/services/cours-service.js"></script>
  <script src="js/services/eleves-service.js"></script>
  <script src="js/services/seances-service.js"></script>
  <script src="js/services/documents-service.js"></script>
  <script src="js/services/questions-service.js"></script>
  <script src="js/components/render-helpers.js"></script>
  <script src="js/seance-direct.js"></script>
</body>
</html>
